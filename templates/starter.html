<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title><!-- TITLE --></title>
<meta name="description" content="<!-- DESCRIPTION -->">
<!-- Security -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests;">
<meta http-equiv="X-Frame-Options" content="DENY">
<meta http-equiv="Referrer-Policy" content="strict-origin-when-cross-origin">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<style>
/* ============================================
   AURORA UI v4 — Starter Template
   Usage: Change accent color, add sections below
   ============================================ */
:root {
  --accent: #c8ff00;
  --accent-dim: rgba(200, 255, 0, 0.15);
  --bg-deep: #050508;
  --bg-primary: #0a0a0f;
  --bg-elevated: #12121a;
  --bg-glass: rgba(10, 10, 15, 0.65);
  --surface-1: rgba(255, 255, 255, 0.03);
  --surface-2: rgba(255, 255, 255, 0.06);
  --surface-3: rgba(255, 255, 255, 0.10);
  --text-primary: rgba(255, 255, 255, 0.95);
  --text-secondary: rgba(255, 255, 255, 0.60);
  --text-tertiary: rgba(255, 255, 255, 0.35);
  --text-muted: rgba(255, 255, 255, 0.15);
  --border-subtle: rgba(255, 255, 255, 0.08);
  --border-hover: rgba(255, 255, 255, 0.15);
  --border-accent: rgba(200, 255, 0, 0.30);
  --space-xs: 4px; --space-sm: 8px; --space-md: 16px;
  --space-lg: 24px; --space-xl: 32px; --space-2xl: 48px;
  --space-3xl: 64px; --space-4xl: 96px;
  --text-xs: .75rem; --text-sm: .875rem; --text-base: 1rem;
  --text-lg: 1.125rem; --text-xl: 1.25rem; --text-2xl: 1.5rem;
  --text-3xl: 1.875rem; --text-4xl: 2.25rem; --text-5xl: 3rem;
  --text-6xl: 3.75rem; --text-7xl: 4.5rem;
  --radius-sm: 4px; --radius-md: 8px; --radius-lg: 12px;
  --radius-xl: 16px; --radius-2xl: 24px; --radius-full: 9999px;
  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1);
  --ease-out-expo: cubic-bezier(0.19, 1, 0.22, 1);
  --fast: 150ms; --normal: 300ms; --slow: 500ms;
  --shadow-sm: 0 1px 2px rgba(0,0,0,0.3);
  --shadow-md: 0 4px 12px rgba(0,0,0,0.4);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.5);
  --shadow-xl: 0 16px 48px rgba(0,0,0,0.6);
  --shadow-glow: 0 0 40px rgba(200,255,0,0.15);
  --blur-sm: blur(8px); --blur-md: blur(12px);
  --blur-lg: blur(20px); --blur-xl: blur(40px);
  --safe-top: env(safe-area-inset-top, 0px);
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg-deep);
  color: var(--text-primary);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  overflow-x: hidden;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
}
.container { width: 100%; padding: 0 var(--space-md); }
@media (min-width: 640px) { .container { max-width: 640px; margin: 0 auto; } }
@media (min-width: 1024px) { .container { max-width: 1024px; padding: 0 var(--space-xl); } }
@media (min-width: 1280px) { .container { max-width: 1280px; } }
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
}
/* === SECTIONS (add your content below) === */
.hero { min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: var(--space-4xl) var(--space-xl); }
h1 { font-size: clamp(32px, 8vw, 96px); letter-spacing: -0.03em; line-height: 1.0; }
h2 { font-size: clamp(24px, 5vw, 56px); letter-spacing: -0.02em; }
p { font-size: clamp(14px, 1.5vw, 18px); line-height: 1.7; color: var(--text-secondary); }
</style>
</head>
<body>
  <div class="hero">
    <div class="container">
      <h1><!-- BRAND NAME --></h1>
      <p><!-- TAGLINE --></p>
    </div>
  </div>
  <script>
  // Scroll progress
  const bar = document.createElement('div');
  bar.className = 'scroll-progress';
  bar.style.cssText = 'position:fixed;top:0;left:0;height:2px;background:linear-gradient(90deg,var(--accent),rgba(0,245,255,0.8));width:0%;z-index:10000;transition:width 50ms linear;';
  document.body.appendChild(bar);
  window.addEventListener('scroll', () => {
    const h = document.documentElement.scrollHeight - window.innerHeight;
    bar.style.width = h > 0 ? (window.scrollY / h * 100) + '%' : '0%';
  }, { passive: true });
  </script>
</body>
</html>
